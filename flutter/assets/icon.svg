<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Ceramic Technology woven hashtag mark -->
  <defs>
    <clipPath id="cTR"><rect x="130" y="82" width="44" height="44"/></clipPath>
    <clipPath id="cBL"><rect x="82" y="130" width="44" height="44"/></clipPath>
  </defs>
  <!-- base: verticals, then horizontals on top -->
  <rect x="82"  y="40" width="44" height="176" rx="22" fill="#EE3463"/>
  <rect x="130" y="40" width="44" height="176" rx="22" fill="#3BA0D9"/>
